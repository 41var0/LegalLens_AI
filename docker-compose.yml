volumes:
  postgres_data:

services:
  db:
    image: postgres:15-alpine
    container_name: legallens_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: legallens_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend-django:
    build: ./backend
    container_name: backend-django-legallens
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app




